AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Backend serverless introductorio para Cromos del Mundial Cloud Edition

Parameters:
  StageName:
    Type: String
    Default: dev
    Description: Nombre del stage del API Gateway REST

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 128
    CodeUri: .
    Environment:
      Variables:
        SERVICE_NAME: cromos-backend-cloud-demo
        STAGE: !Ref StageName
        LOG_LEVEL: info
        APP_VERSION: 1.0.0
        STICKERS_TABLE: !Ref StickersTable
        PLAYERS_TABLE: !Ref PlayersTable
        TEAMS_TABLE: !Ref TeamsTable
        COUNTRIES_TABLE: !Ref CountriesTable
        PHOTOS_BUCKET: !Ref PlayerPhotosBucket

Resources:
  CromosRestApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: cromos-backend-cloud-demo-rest-api
      StageName: !Ref StageName
      EndpointConfiguration: REGIONAL
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"

  RootFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cromos-backend-root
      Handler: src/handlers/root.lambdaHandler
      Environment:
        Variables:
          DOMAIN_NAME: root
      Events:
        RootGet:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /
            Method: GET
        RootOptions:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /
            Method: OPTIONS

  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cromos-backend-health
      Handler: src/handlers/health.lambdaHandler
      Environment:
        Variables:
          DOMAIN_NAME: health
      Events:
        HealthGet:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /health
            Method: GET
        HealthOptions:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /health
            Method: OPTIONS

  CountriesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cromos-backend-countries
      Handler: src/handlers/countries.lambdaHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CountriesTable
      Environment:
        Variables:
          DOMAIN_NAME: countries
      Events:
        CountriesList:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /countries
            Method: GET
        CountriesCreate:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /countries
            Method: POST
        CountriesById:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /countries/{id}
            Method: GET
        CountriesUpdate:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /countries/{id}
            Method: PUT
        CountriesDelete:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /countries/{id}
            Method: DELETE
        CountriesOptions:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /countries
            Method: OPTIONS
        CountriesByIdOptions:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /countries/{id}
            Method: OPTIONS

  TeamsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cromos-backend-teams
      Handler: src/handlers/teams.lambdaHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TeamsTable
      Environment:
        Variables:
          DOMAIN_NAME: teams
      Events:
        TeamsList:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /teams
            Method: GET
        TeamsCreate:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /teams
            Method: POST
        TeamsById:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /teams/{id}
            Method: GET
        TeamsUpdate:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /teams/{id}
            Method: PUT
        TeamsDelete:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /teams/{id}
            Method: DELETE
        TeamsOptions:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /teams
            Method: OPTIONS
        TeamsByIdOptions:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /teams/{id}
            Method: OPTIONS

  PlayersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cromos-backend-players
      Handler: src/handlers/players.lambdaHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBReadPolicy:
            TableName: !Ref TeamsTable
        - DynamoDBReadPolicy:
            TableName: !Ref CountriesTable
        - S3CrudPolicy:
            BucketName: !Ref PlayerPhotosBucket
      Environment:
        Variables:
          DOMAIN_NAME: players
      Events:
        PlayersList:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /players
            Method: GET
        PlayersCreate:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /players
            Method: POST
        PlayersById:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /players/{id}
            Method: GET
        PlayersUpdate:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /players/{id}
            Method: PUT
        PlayersDelete:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /players/{id}
            Method: DELETE
        PlayersOptions:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /players
            Method: OPTIONS
        PlayersByIdOptions:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /players/{id}
            Method: OPTIONS

  StickersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cromos-backend-stickers
      Handler: src/handlers/stickers.lambdaHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref StickersTable
        - DynamoDBReadPolicy:
            TableName: !Ref PlayersTable
      Environment:
        Variables:
          DOMAIN_NAME: stickers
      Events:
        StickersList:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /stickers
            Method: GET
        StickersCreate:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /stickers
            Method: POST
        StickersById:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /stickers/{id}
            Method: GET
        StickersUpdate:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /stickers/{id}
            Method: PUT
        StickersDelete:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /stickers/{id}
            Method: DELETE
        StickersOptions:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /stickers
            Method: OPTIONS
        StickersByIdOptions:
          Type: Api
          Properties:
            RestApiId: !Ref CromosRestApi
            Path: /stickers/{id}
            Method: OPTIONS

  StickersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "cromos-stickers-${StageName}"
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1

  PlayersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "cromos-players-${StageName}"
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1

  TeamsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "cromos-teams-${StageName}"
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1

  CountriesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "cromos-countries-${StageName}"
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1

  PlayerPhotosBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "cromos-player-photos-${StageName}-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - "GET"
              - "PUT"
              - "POST"
              - "DELETE"
            AllowedOrigins:
              - "*"

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "cromos-user-pool-${StageName}"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "cromos-user-pool-client-${StageName}"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

Outputs:
  RestApiUrl:
    Description: URL base del API Gateway REST compatible con Learner Lab
    Value: !Sub "https://${CromosRestApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"
  CognitoUserPoolId:
    Description: ID del User Pool de Cognito
    Value: !Ref CognitoUserPool
  CognitoUserPoolClientId:
    Description: ID del Cliente de Cognito User Pool
    Value: !Ref CognitoUserPoolClient
  PlayerPhotosBucketName:
    Description: Nombre del Bucket S3 para fotos de jugadores
    Value: !Ref PlayerPhotosBucket
